<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0516" />
      <stop offset="50%" stop-color="#140b2b" />
      <stop offset="100%" stop-color="#05020c" />
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowSubtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#271c4d" stroke-width="6" />

  <!-- Neural Connections / Audio Wave Grid in background -->
  <g opacity="0.15">
    <circle cx="256" cy="256" r="180" fill="none" stroke="#6366f1" stroke-dasharray="8 8" stroke-width="2" />
    <circle cx="256" cy="256" r="120" fill="none" stroke="#06b6d4" stroke-dasharray="6 6" stroke-width="1.5" />
    <line x1="256" y1="50" x2="256" y2="462" stroke="#6366f1" stroke-width="1" />
    <line x1="50" y1="256" x2="462" y2="256" stroke="#6366f1" stroke-width="1" />
  </g>

  <!-- Glowing Soundwave Paths in the center -->
  <path d="M 120 256 Q 160 140 200 256 T 280 256 T 360 256 T 392 256" 
        fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6" filter="url(#glowSubtle)" />
        
  <path d="M 120 256 Q 160 300 200 256 T 280 256 T 360 256 T 392 256" 
        fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.4" />

  <!-- Main Intelligent Music Note (Stylized Double Eighth Note with Cross Accents) -->
  <g filter="url(#glow)">
    <!-- Right Note Stem & Flag -->
    <path d="M 310 120 L 310 320" stroke="url(#primaryGrad)" stroke-width="18" stroke-linecap="round" />
    <path d="M 200 160 L 200 360" stroke="url(#primaryGrad)" stroke-width="18" stroke-linecap="round" />
    
    <!-- Connecting Bar (Eighth Note Beam) -->
    <path d="M 200 170 L 315 130" stroke="url(#primaryGrad)" stroke-width="22" stroke-linecap="round" />
    <path d="M 200 215 L 315 175" stroke="url(#primaryGrad)" stroke-width="12" stroke-linecap="round" opacity="0.8" />
    
    <!-- Left Note Head (Tilt ellipse) -->
    <g transform="translate(200, 360) rotate(-25)">
      <ellipse cx="-20" cy="0" rx="35" ry="24" fill="url(#primaryGrad)" />
    </g>
    
    <!-- Right Note Head (Tilt ellipse) -->
    <g transform="translate(310, 320) rotate(-25)">
      <ellipse cx="-20" cy="0" rx="35" ry="24" fill="url(#primaryGrad)" />
    </g>
  </g>

  <!-- Glowing Star/Cross of Inspiration in Top Right -->
  <g transform="translate(350, 110)" filter="url(#glowSubtle)">
    <path d="M 0 -25 L 6 -6 L 25 0 L 6 6 L 0 25 L -6 6 L -25 0 L -6 -6 Z" fill="#06b6d4" />
    <circle cx="0" cy="0" r="4" fill="#ffffff" />
  </g>
  
  <!-- Neural Nodes Overlay (Representing IA) -->
  <g filter="url(#glowSubtle)">
    <circle cx="200" cy="170" r="8" fill="#06b6d4" />
    <circle cx="310" cy="130" r="8" fill="#06b6d4" />
    <circle cx="255" cy="150" r="6" fill="#06b6d4" />
    
    <circle cx="165" cy="345" r="7" fill="#ffffff" />
    <circle cx="275" cy="305" r="7" fill="#ffffff" />
    
    <!-- Connecting lines -->
    <line x1="200" y1="170" x2="255" y2="150" stroke="#06b6d4" stroke-width="2" />
    <line x1="255" y1="150" x2="310" y2="130" stroke="#06b6d4" stroke-width="2" />
  </g>
</svg>
